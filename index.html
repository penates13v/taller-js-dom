<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller Manipulación del DOM</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <section>
        <h1 id="titulo">Hola Mundo</h1>
        <p class="descripcion">Texto de prueba</p>
    </section>

    <section>
        <button id="btnModificar">Modificar Título</button>
    </section>

    <hr>

    <section>
        <h3>Espejo de Texto</h3>
        <input type="text" id="inputUsuario" placeholder="Escribe algo aquí...">
        <p id="espejo"></p>
    </section>

    <hr>

    <section>
        <h2>Contador</h2>
        <p id="numero">0</p>
        <button id="disminuir">-</button>
        <button id="aumentar">+</button>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
